server:
  port: 8080

spring:
  application:
    name: digital-device-store
  sql:
    init:
      mode: always   # 启动时自动执行 classpath 下的 schema.sql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/digital_device_store?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: root

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true                      # 表字段下划线 -> 实体驼峰
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl    # 控制台打印 SQL，方便调试
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
